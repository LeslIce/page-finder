<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#84cbab" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="单词本" />
  <title>单词笔记本</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Quicksand:wght@500;700&display=swap');

    :root {
      --black: #000000;
      --white: #ffffff;
      --mint-rgb: 132, 203, 171;
      --mint-solid: #84cbab;
      --mint: rgba(var(--mint-rgb), 0.82);
      --mint-soft: rgba(var(--mint-rgb), 0.22);
      --mint-faint: rgba(var(--mint-rgb), 0.08);
      --mint-flash-strong: rgba(var(--mint-rgb), 0.16);
      --mint-flash-weak: rgba(var(--mint-rgb), 0.09);
      --keyboard-offset: 0px;
      --keyboard-lift: 0px;
      --gray: #5f5d5d;
      --gray-deep: #4c4b4b;
      --line: rgba(0, 0, 0, 0.16);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --ui-sans: "Quicksand", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      --title-sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--white);
      color: var(--black);
      overflow: hidden;
      font-family: "Lora", "Times New Roman", Georgia, serif;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      border: 0;
      outline: none;
      background: none;
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.8);
    }

    #app {
      position: fixed;
      inset: 0;
      background: var(--white);
      overflow: hidden;
    }

    .view {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: var(--white);
    }

    .view.active {
      display: flex;
    }

    .page-shell {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-left: calc(18px + var(--safe-left));
      padding-right: calc(18px + var(--safe-right));
      padding-bottom: calc(22px + var(--safe-bottom));
      padding-top: calc(16px + var(--safe-top));
    }

    .page-shell.with-bottom-button {
      padding-bottom: calc(98px + var(--safe-bottom));
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 34px;
    }

    .shelf-topbar {
      display: flex;
      justify-content: flex-end;
      min-height: 34px;
    }

    .shelf-gear-button svg,
    .mode-button svg,
    .plain-icon-button svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .plain-icon-button {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      color: var(--black);
      font-family: var(--ui-sans);
      font-size: 23px;
      line-height: 1;
      padding: 0;
      flex: 0 0 auto;
    }

    .plain-icon-button:active {
      border-color: var(--line);
    }

    .notebook-title {
      min-width: 0;
      font-family: var(--title-sans);
      font-size: clamp(1.34rem, 5vw, 1.56rem);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.022em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 52px;
    }

    .search-trigger {
      width: 100%;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      background: var(--mint);
      color: var(--white);
      border-radius: 16px;
      padding: 0 16px;
      margin-top: 12px;
    }

    .search-trigger.compact {
      margin-top: 14px;
      margin-right: 42px;
    }

    .search-trigger-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .search-trigger-label {
      flex: 1;
      min-width: 0;
      color: rgba(255, 255, 255, 0.82);
      font-family: var(--ui-sans);
      font-size: 0.96rem;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      transform: translateX(-10px);
    }

    .shelf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
      gap: 22px 18px;
      padding-top: 20px;
      align-content: start;
    }

    .book-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .book-figure {
      width: 78px;
      height: 118px;
      position: relative;
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .book-order {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      line-height: 1;
      padding-right: 0;
      font-weight: 500;
      font-family: var(--title-sans);
      pointer-events: none;
    }

    .book-caption {
      font-size: 0.78rem;
      line-height: 1.15;
      color: var(--black);
      text-align: center;
      min-height: 1.8em;
    }

    .book-plus {
      width: 78px;
      height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ui-sans);
      font-size: 2.5rem;
      line-height: 1;
      color: var(--black);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .shelf-spacer {
      min-height: 8px;
    }

    #listView {
      position: absolute;
      inset: 0;
    }

    #listShell {
      position: relative;
    }

    .mode-dock {
      position: absolute;
      right: calc(10px + var(--safe-right));
      bottom: calc(154px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 8;
    }

    .mode-button {
      width: 30px;
      height: 30px;
      border-radius: 0;
      background: var(--mint-soft);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ui-sans);
      font-size: 0.88rem;
      line-height: 1;
      padding: 0;
      transition: background-color 160ms ease, transform 160ms ease;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .mode-button.active {
      background: var(--mint);
    }

    .mode-button:active {
      transform: scale(0.97);
    }


    .word-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      margin-top: 16px;
      padding-right: 46px;
      border-top: 1px solid var(--line);
    }

    .word-list.swipe-suspended {
      pointer-events: none;
    }

    .word-item {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      touch-action: pan-y;
    }

    .word-item.flash-highlight .swipe-content {
      animation: flash-row 1.25s ease;
    }

    @keyframes flash-row {
      0% {
        background: var(--mint-flash-strong);
      }
      55% {
        background: var(--mint-flash-weak);
      }
      100% {
        background: transparent;
      }
    }

    .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 112px;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .row-action {
      flex: 1 1 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
    }

    .row-action svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .row-action.edit {
      background: var(--mint);
    }

    .row-action.delete {
      background: var(--black);
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 0 4px 0 0;
      background: var(--white);
      transform: translateX(0);
      transition: transform 180ms ease;
    }

    .list-page {
      min-width: 52px;
      padding-left: 2px;
      font-size: 0.94rem;
      letter-spacing: 0.04em;
      color: var(--mint-solid);
      white-space: nowrap;
      font-family: var(--ui-sans);
      font-weight: 700;
    }

    .list-word {
      min-width: 0;
      font-size: 1.05rem;
      line-height: 1.35;
      padding-right: 10px;
      word-break: break-word;
      color: var(--black);
    }

    .list-word.analysis {
      color: var(--gray);
    }

    .empty-block {
      min-height: 34vh;
    }

    .add-word-button {
      position: absolute;
      left: calc(18px + var(--safe-left));
      right: calc(18px + var(--safe-right));
      bottom: calc(18px + var(--safe-bottom));
      min-height: 52px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ui-sans);
      font-size: 1.35rem;
      line-height: 1;
      z-index: 7;
      border: 1px solid transparent;
    }

    .add-word-button:active {
      transform: translateY(1px);
    }

    .entry-shell {
      display: flex;
      flex-direction: column;
      padding-bottom: calc(24px + var(--safe-bottom));
      scroll-padding-bottom: calc(132px + var(--keyboard-offset));
    }

    .entry-wrap {
      display: flex;
      flex-direction: column;
      gap: 34px;
      margin-top: clamp(218px, 34vh, 322px);
      transform: translateY(var(--keyboard-lift));
      transition: transform 220ms ease;
      padding-top: 0;
    }

    .entry-title {
      font-family: var(--title-sans);
      font-size: clamp(1.3rem, 4.8vw, 1.48rem);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }

    .entry-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 28px;
      gap: 12px;
      align-items: center;
    }

    .entry-input {
      min-height: 56px;
      border: 1px solid var(--black);
      padding: 0 14px;
      background: var(--white);
      color: var(--black);
      font-size: 1.02rem;
      line-height: 1.2;
      border-radius: 14px;
    }

    .entry-row .entry-input {
      border-width: 2px;
    }

    .entry-page {
      text-align: center;
      font-family: var(--ui-sans);
    }

    .entry-word {
      font-size: 1.05rem;
    }

    .analysis-toggle {
      position: relative;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .analysis-toggle input {
      position: absolute;
      opacity: 0;
      inset: 0;
      margin: 0;
    }

    .analysis-toggle-box {
      width: 20px;
      height: 20px;
      border: 1.6px solid var(--black);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
    }

    .analysis-toggle input:checked + .analysis-toggle-box {
      background: var(--black);
    }

    .analysis-toggle input:checked + .analysis-toggle-box::after {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--white);
      display: block;
    }

    .entry-actions {
      display: flex;
      justify-content: center;
      gap: 22px;
      padding-top: 2px;
    }

    .entry-button {
      width: 60px;
      height: 60px;
      border-radius: 999px;
      background: #cfcfd3;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 130ms ease, background-color 130ms ease;
      flex: 0 0 auto;
    }

    .entry-button svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .entry-button.flash,
    .entry-button.can-save {
      background: var(--mint);
    }

    .entry-button.cancel {
      background: var(--black);
    }

    .entry-button:disabled {
      opacity: 1;
      pointer-events: none;
    }

    .entry-button:active {
      transform: scale(0.97);
    }

    .search-header {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: center;
    }

    .search-input {
      min-height: 46px;
      border-radius: 16px;
      background: var(--mint);
      color: var(--white);
      padding: 0 15px;
      font-size: 1rem;
      line-height: 1.2;
      caret-color: var(--white);
      font-family: var(--ui-sans);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.82);
    }

    .search-input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
      display: none;
    }

    .search-results {
      margin-top: 16px;
      border-top: 1px solid var(--line);
    }

    .search-row {
      width: 100%;
      display: grid;
      grid-template-columns: 60px 52px minmax(0, 1fr);
      align-items: flex-start;
      gap: 8px 10px;
      min-height: 64px;
      padding: 12px 2px 11px 0;
      border-bottom: 1px solid var(--line);
      text-align: left;
      background: var(--white);
    }

    .search-row.main {
      background: var(--mint-faint);
    }

    .search-book {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      color: var(--mint-solid);
      font-family: var(--ui-sans);
      font-size: 1.28rem;
      font-weight: 700;
      line-height: 1;
      padding-top: 4px;
      padding-left: 10px;
    }

    .search-page {
      font-size: 1rem;
      color: var(--gray);
      white-space: nowrap;
      padding-top: 5px;
      font-family: var(--ui-sans);
    }

    .search-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 8px;
    }

    .search-word {
      font-size: 1.02rem;
      line-height: 1.35;
      word-break: break-word;
      color: var(--black);
    }

    .search-word.analysis {
      color: var(--gray);
    }

    .search-meaning {
      min-height: 1.15em;
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--gray-deep);
      white-space: pre-wrap;
    }

    .search-meaning:empty {
      display: none;
    }

    .settings-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 28px;
    }

    .settings-title {
      font-family: var(--title-sans);
      font-size: 1.18rem;
      font-weight: 500;
      line-height: 1.15;
    }

    .settings-label {
      font-size: 0.95rem;
      line-height: 1.3;
    }

    .settings-input {
      min-height: 52px;
      border: 1.5px solid var(--black);
      border-radius: 14px;
      padding: 0 14px;
      background: var(--white);
      color: var(--black);
      font-size: 0.98rem;
      line-height: 1.2;
      font-family: var(--ui-sans);
    }

    .settings-input::placeholder {
      color: rgba(0, 0, 0, 0.34);
    }

    .settings-hint {
      font-size: 0.84rem;
      line-height: 1.55;
      color: var(--gray);
      white-space: pre-wrap;
    }

    .settings-save-button {
      min-height: 48px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ui-sans);
      font-size: 1rem;
      line-height: 1;
      padding: 0 18px;
      align-self: flex-start;
    }

    .settings-save-button:active {
      transform: translateY(1px);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: calc(24px + var(--safe-top)) calc(20px + var(--safe-right)) calc(24px + var(--safe-bottom)) calc(20px + var(--safe-left));
      background: rgba(255, 255, 255, 0.84);
      z-index: 50;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-card {
      width: min(100%, 360px);
      border: 1px solid var(--black);
      background: var(--white);
      padding: 18px 16px 16px;
    }

    .modal-title {
      font-size: 1rem;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .modal-text {
      font-size: 0.95rem;
      line-height: 1.5;
      min-height: 1.5em;
      white-space: pre-wrap;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .modal-button {
      min-width: 78px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      font-family: var(--ui-sans);
      font-size: 0.92rem;
      line-height: 1;
      border: 1px solid var(--black);
      color: var(--black);
      background: var(--white);
    }

    .modal-button.dark {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .modal-button.mint {
      background: var(--mint);
      color: var(--white);
      border-color: var(--mint);
    }

    .edit-grid {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 26px;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .footer-gap {
      height: 4px;
    }

    @media (min-width: 768px) {
      .page-shell {
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
      }

      .mode-dock {
        right: max(calc((100vw - 720px) / 2 + 10px), 10px);
      }

      .entry-wrap {
        margin-top: 236px;
      }

      .add-word-button {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: min(684px, calc(100vw - 36px));
      }

      .add-word-button:active {
        transform: translateX(-50%) translateY(1px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="shelfView" class="view active" aria-label="书架页">
      <div class="page-shell">
        <div class="shelf-topbar">
          <button id="openSettingsButton" class="plain-icon-button shelf-gear-button" type="button" aria-label="设置">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 8.3a3.7 3.7 0 1 0 0 7.4 3.7 3.7 0 0 0 0-7.4Z" stroke="currentColor" stroke-width="1.8"></path>
              <path d="M19.4 13.2v-2.4l-2-.5a5.7 5.7 0 0 0-.5-1.2l1.1-1.8-1.7-1.7-1.8 1.1c-.4-.2-.8-.4-1.2-.5l-.5-2H10l-.5 2c-.4.1-.8.3-1.2.5L6.5 5.6 4.8 7.3l1.1 1.8c-.2.4-.4.8-.5 1.2l-2 .5v2.4l2 .5c.1.4.3.8.5 1.2l-1.1 1.8 1.7 1.7 1.8-1.1c.4.2.8.4 1.2.5l.5 2h2.4l.5-2c.4-.1.8-.3 1.2-.5l1.8 1.1 1.7-1.7-1.1-1.8c.2-.4.4-.8.5-1.2l2-.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
        <button id="shelfSearchTrigger" class="search-trigger" type="button" aria-label="搜索全部笔记本">
          <svg class="search-trigger-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="5.5" stroke="currentColor" stroke-width="2"></circle>
            <path d="M15 15L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          <span class="search-trigger-label">搜索所有单词…</span>
        </button>
        <div id="shelfGrid" class="shelf-grid"></div>
      </div>
    </section>

    <section id="listView" class="view" aria-label="单词列表页">
      <div id="listShell" class="page-shell with-bottom-button">
        <div class="header-row">
          <button id="backToShelfButton" class="plain-icon-button" type="button" aria-label="返回书架">←</button>
          <div id="listNotebookTitle" class="notebook-title"></div>
        </div>

        <button id="listSearchTrigger" class="search-trigger compact" type="button" aria-label="搜索全部笔记本">

            <circle cx="10.5" cy="10.5" r="5.5" stroke="currentColor" stroke-width="2"></circle>

        <div class="mode-dock" aria-label="排序与筛选">

          <button id="sortTimeButton" class="mode-button" type="button" data-mode="sort" data-value="time" aria-label="按时间倒序">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"></circle>
              <path d="M12 7V12L15.5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>

            <svg viewBox="0 0 24 24" aria-hidden="true">

              <path d="M4 20L20 4" stroke="currentColor" stroke-width="2"></path>

          <button id="filterMainButton" class="mode-button" type="button" data-mode="filter" data-value="mainOnly" aria-label="只显示主单词">
            <svg viewBox="0 0 24 24" aria-hidden="true">

    <section id="entryView" class="view" aria-label="录入界面">
      <div class="page-shell entry-shell">
        <div id="entryNotebookTitle" class="entry-title"></div>

        <div class="entry-wrap">

              id="entryPageInput"

            <input
              id="entryWordInput"
              class="entry-input entry-word"
              type="text"
              lang="en"
              inputmode="text"

            <label class="analysis-toggle" aria-label="辨析词">
              <input id="entryAnalysisInput" type="checkbox" />

          <div class="entry-actions">
            <button id="entryCancelButton" class="entry-button cancel" type="button" aria-label="返回">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">

                <path d="M11 6L5 12L11 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="butt" stroke-linejoin="miter"></path>
              </svg>

              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">

              </svg>
            </button>
            <button id="entrySaveNextButton" class="entry-button" type="button" aria-label="保存并下一页">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12H19" stroke="currentColor" stroke-width="2.2" stroke-linecap="butt"></path>
                <path d="M13 6L19 12L13 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="butt" stroke-linejoin="miter"></path>
              </svg>

    <section id="settingsView" class="view" aria-label="设置页">
      <div class="page-shell">
        <div class="header-row">
          <button id="settingsBackButton" class="plain-icon-button" type="button" aria-label="返回">←</button>
          <div class="settings-title">设置</div>
        </div>
        <div class="settings-wrap">
          <div class="settings-label">API key</div>
          <input
            id="apiKeyInput"
            class="settings-input"
            type="password"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"

            placeholder="sk-..."
            aria-label="API key"
          />

          <input
            id="modelInput"
            class="settings-input"
            type="text"
            autocapitalize="none"

            autocomplete="off"
            placeholder="Qwen/Qwen3-8B"
            aria-label="模型名称"
          />

    <section id="searchView" class="view" aria-label="搜索结果页">
      <div class="page-shell">

          <input
            id="searchInput"
            class="search-input"
            type="search"
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            placeholder="搜索所有单词…"
            aria-label="搜索"
          />
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>

    <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalText">
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalText" class="modal-text"></div>

    <div id="editOverlay" class="modal-overlay" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editTitle">
        <div id="editTitle" class="modal-title">编辑</div>
        <div class="edit-grid">
          <input
            id="editPageInput"
            class="entry-input entry-page"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            pattern="[0-9]*"
            aria-label="编辑页码"
          />
          <input
            id="editWordInput"
            class="entry-input entry-word"
            type="text"
            lang="en"
            inputmode="text"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            autocomplete="off"
            aria-label="编辑单词"
          />
          <label class="analysis-toggle" aria-label="编辑辨析词">
            <input id="editAnalysisInput" type="checkbox" />
            <span class="analysis-toggle-box"></span>
          </label>
        </div>
        <div class="modal-buttons">
          <button id="editCancelButton" class="modal-button" type="button">取消</button>
          <button id="editSaveButton" class="modal-button mint" type="button">保存</button>
        </div>
      </div>

  </div>

  <script>
    (() => {
      "use strict";

      const DB_NAME = "VocabNotebook";
      const DB_VERSION = 1;
      const APP_STATE_ID = "main";
      const MAX_NOTEBOOKS = 30;
      const SWIPE_WIDTH = 112;

      const state = {
        db: null,
        notebooks: [],
        words: [],
        currentView: "shelf",
        currentNotebookId: null,
        sortMode: "page",
        filterMode: "mainOnly",
        searchOrigin: "shelf",
        pendingHighlightWordId: null,
        editingWordId: null,
        modalResolver: null,
        searchMeaningController: null,
        searchMeaningTimer: null,
        searchMeaningToken: 0,
        ignoreSwipeUntil: 0,
        listInteractionTimer: null,
        entryViewportBase: 0,
        entryViewportTimer: null,
        entryKeyboardSettlingUntil: 0
      };

      const els = {};

      document.addEventListener("DOMContentLoaded", init);

      // 应用入口：初始化 DOM、数据库、缓存，并恢复上次停留位置。
      async function init() {
        cacheElements();
        setupAppChrome();
        bindStaticEvents();

        try {
          state.db = await openDatabase();
          await ensureAppState();
          await refreshCaches();
          await restoreApp();
        } catch (error) {
          console.error(error);
          await showDialog({
            title: "初始化失败",
            text: "IndexedDB 无法使用，请尝试在非隐私模式下重新打开。",
            buttons: [{ text: "知道了", value: "ok", variant: "dark" }]
          });
        }
      }

      function cacheElements() {
        els.shelfView = document.getElementById("shelfView");
        els.listView = document.getElementById("listView");
        els.entryView = document.getElementById("entryView");
        els.settingsView = document.getElementById("settingsView");
        els.searchView = document.getElementById("searchView");

        els.shelfGrid = document.getElementById("shelfGrid");
        els.wordList = document.getElementById("wordList");
        els.searchResults = document.getElementById("searchResults");

        els.shelfSearchTrigger = document.getElementById("shelfSearchTrigger");
        els.listSearchTrigger = document.getElementById("listSearchTrigger");
        els.searchInput = document.getElementById("searchInput");
        els.searchBackButton = document.getElementById("searchBackButton");
        els.openSettingsButton = document.getElementById("openSettingsButton");
        els.settingsBackButton = document.getElementById("settingsBackButton");
        els.apiKeyInput = document.getElementById("apiKeyInput");
        els.modelInput = document.getElementById("modelInput");
        els.settingsSaveButton = document.getElementById("settingsSaveButton");

        els.backToShelfButton = document.getElementById("backToShelfButton");
        els.addWordButton = document.getElementById("addWordButton");
        els.listNotebookTitle = document.getElementById("listNotebookTitle");

        els.entryNotebookTitle = document.getElementById("entryNotebookTitle");
        els.entryCancelButton = document.getElementById("entryCancelButton");
        els.entrySaveButton = document.getElementById("entrySaveButton");
        els.entrySaveNextButton = document.getElementById("entrySaveNextButton");
        els.entryPageInput = document.getElementById("entryPageInput");
        els.entryWordInput = document.getElementById("entryWordInput");
        els.entryAnalysisInput = document.getElementById("entryAnalysisInput");

        els.sortPageButton = document.getElementById("sortPageButton");
        els.sortAlphaButton = document.getElementById("sortAlphaButton");
        els.sortTimeButton = document.getElementById("sortTimeButton");
        els.filterAllButton = document.getElementById("filterAllButton");
        els.filterMainButton = document.getElementById("filterMainButton");

        els.modalOverlay = document.getElementById("modalOverlay");
        els.modalTitle = document.getElementById("modalTitle");
        els.modalText = document.getElementById("modalText");
        els.modalButtons = document.getElementById("modalButtons");

        els.editOverlay = document.getElementById("editOverlay");
        els.editPageInput = document.getElementById("editPageInput");
        els.editWordInput = document.getElementById("editWordInput");
        els.editAnalysisInput = document.getElementById("editAnalysisInput");
        els.editCancelButton = document.getElementById("editCancelButton");
        els.editSaveButton = document.getElementById("editSaveButton");
      }

      function setupAppChrome() {
        const iconSvg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
            <rect width="192" height="192" rx="38" fill="#84cbab"/>
            <path d="M58 134l10-36 55-55 26 26-55 55-36 10z" fill="#ffffff"/>
            <path d="M111 55l26 26" stroke="#84cbab" stroke-width="8" stroke-linecap="round"/>
            <path d="M69 123l16 16" stroke="#84cbab" stroke-width="8" stroke-linecap="round"/>
          </svg>
        `.trim();
        const iconUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg);

        let manifestLink = document.querySelector('link[rel="manifest"]');
        if (!manifestLink) {
          manifestLink = document.createElement("link");
          manifestLink.rel = "manifest";
          document.head.appendChild(manifestLink);
        }

        const manifest = {
          name: "单词笔记本",
          short_name: "单词本",
          start_url: "./",
          display: "standalone",
          background_color: "#FFFFFF",
          theme_color: "#84cbab",
          icons: [
            { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
            { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any" }
          ]
        };

        manifestLink.href =
          "data:application/manifest+json;charset=utf-8," +
          encodeURIComponent(JSON.stringify(manifest));

        const rels = ["icon", "apple-touch-icon"];
        rels.forEach((rel) => {
          let link = document.querySelector(`link[rel="${rel}"]`);
          if (!link) {
            link = document.createElement("link");
            link.rel = rel;
            document.head.appendChild(link);
          }
          link.href = iconUrl;
        });

        /**
         * 受“单文件 HTML”限制，这里不额外生成独立的 Service Worker 文件。
         * 在 iPhone Safari 添加到主屏幕后，仍可使用 standalone 外观与 IndexedDB 持久数据。
         */
      }

      function bindStaticEvents() {
        els.shelfSearchTrigger.addEventListener("click", () => openSearch("shelf"));
        els.listSearchTrigger.addEventListener("click", () => openSearch("list"));
        els.searchBackButton.addEventListener("click", handleSearchBack);
        els.openSettingsButton.addEventListener("click", openSettings);
        els.settingsBackButton.addEventListener("click", openShelf);
        els.settingsSaveButton.addEventListener("click", saveSettings);

        els.backToShelfButton.addEventListener("click", () => {
          openShelf();
        });

        els.addWordButton.addEventListener("click", () => {
          openEntry();
        });

        els.entryCancelButton.addEventListener("click", () => {
          openNotebook(state.currentNotebookId);
        });

        els.entrySaveButton.addEventListener("click", () => handleEntrySave("stay"));
        els.entrySaveNextButton.addEventListener("click", () => handleEntrySave("next"));

        els.searchInput.addEventListener("input", renderSearchResults);
        [els.apiKeyInput, els.modelInput].forEach((input) => {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              saveSettings();
            }
          });
        });

        [els.entryPageInput, els.editPageInput].forEach((input) => {
          input.addEventListener("input", () => {
            input.value = input.value.replace(/\D+/g, "").slice(0, 3);
            updateEntryButtons();
            updateEditButtons();
          });
        });

        [els.entryWordInput, els.editWordInput].forEach((input) => {
          input.addEventListener("input", () => {
            updateEntryButtons();
            updateEditButtons();
          });
        });

        els.entryAnalysisInput.addEventListener("change", updateEntryButtons);
        els.editAnalysisInput.addEventListener("change", updateEditButtons);

        els.editCancelButton.addEventListener("click", closeEditModal);
        els.editSaveButton.addEventListener("click", saveEditedWord);

        document.querySelectorAll(".mode-button").forEach((button) => {
          button.addEventListener("click", async () => {
            const mode = button.dataset.mode;
            const value = button.dataset.value;
            if (mode === "sort") {
              state.sortMode = value;
            } else {
              state.filterMode = value;
            }
            updateModeButtons();
            await saveAppState({
              lastNotebookId: state.currentNotebookId,
              lastSortMode: state.sortMode,
              lastFilterMode: state.filterMode
            });
            renderList();
          });
        });

        document.addEventListener("click", (event) => {
          if (!event.target.closest(".word-item")) {
            closeAllSwipes();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            if (els.editOverlay.classList.contains("show")) {
              closeEditModal();
            } else if (els.modalOverlay.classList.contains("show")) {
              closeDialog("cancel");
            }
          }
        });

        els.modalOverlay.addEventListener("click", (event) => {
          if (event.target === els.modalOverlay) {
            closeDialog("cancel");
          }
        });

        els.editOverlay.addEventListener("click", (event) => {
          if (event.target === els.editOverlay) {
            closeEditModal();
          }
        });

        els.wordList.addEventListener("scroll", () => {
          closeAllSwipes();
        }, { passive: true });

        window.addEventListener("online", () => {
          if (state.currentView === "search" && els.searchInput.value.trim()) {
            renderSearchResults();
          }
        });

        bindViewportWatch();
      }

      async function restoreApp() {
        const appState = await getAppState();
        state.sortMode = appState.lastSortMode || "page";
        state.filterMode = appState.lastFilterMode || "mainOnly";
        updateModeButtons();

        const targetNotebook = state.notebooks.find(
          (notebook) => notebook.id === appState.lastNotebookId
        );

        if (targetNotebook) {
          await openNotebook(targetNotebook.id);
        } else {
          await openShelf();
        }
      }

      // 将笔记本与单词一次性读入内存，减少搜索与重绘时的 IndexedDB 访问频率。
      async function refreshCaches() {
        state.notebooks = (await getAllRecords("notebooks")).sort((a, b) => a.order - b.order);
        state.words = await getAllRecords("words");
      }

      async function openShelf() {
        state.currentView = "shelf";
        state.currentNotebookId = null;
        showView("shelf");
        renderShelf();
        await saveAppState({
          lastNotebookId: null,
          lastSortMode: state.sortMode,
          lastFilterMode: state.filterMode
        });
      }

      // 进入某一本笔记本，并同步记住当前排序 / 筛选状态。
      async function openNotebook(notebookId, options = {}) {
        const notebook = state.notebooks.find((item) => item.id === notebookId);
        if (!notebook) {
          await openShelf();
          return;
        }

        state.currentView = "list";
        state.currentNotebookId = notebookId;

        if (options.sortMode) {
          state.sortMode = options.sortMode;
        }
        if (options.filterMode) {
          state.filterMode = options.filterMode;
        }
        if (typeof options.highlightWordId === "number") {
          state.pendingHighlightWordId = options.highlightWordId;
        }
        if (options.fromSearch) {
          state.ignoreSwipeUntil = performance.now() + 760;
        }

        updateModeButtons();
        showView("list");
        renderList();

        await saveAppState({
          lastNotebookId: notebookId,
          lastSortMode: state.sortMode,
          lastFilterMode: state.filterMode
        });
      }

      function openEntry() {
        const notebook = getCurrentNotebook();
        if (!notebook) {
          return;
        }
        state.currentView = "entry";
        showView("entry");
        resetEntryForm();
        els.entryNotebookTitle.textContent = formatNotebookTitle(notebook);
        state.entryViewportBase = getViewportLayoutHeight();
        state.entryKeyboardSettlingUntil = 0;
        applyEntryKeyboardLift(0, 0);
      }

      async function openSettings() {
        state.currentView = "settings";
        showView("settings");
        const appState = await getAppState();
        els.apiKeyInput.value = appState.apiKey || "";
        els.modelInput.value = appState.modelName || "Qwen/Qwen3-8B";
        requestAnimationFrame(() => {
          els.apiKeyInput.focus({ preventScroll: true });
          els.apiKeyInput.setSelectionRange(els.apiKeyInput.value.length, els.apiKeyInput.value.length);
        });
      }

      function openSearch(origin) {
        state.searchOrigin = origin;
        state.currentView = "search";
        showView("search");
        els.searchInput.value = "";
        renderSearchResults();
        requestAnimationFrame(() => {
          els.searchInput.focus({ preventScroll: true });
        });
      }

      function handleSearchBack() {
        if (state.searchOrigin === "list" && getCurrentNotebook()) {
          state.currentView = "list";
          showView("list");
          renderList();
        } else {
          openShelf();
        }
      }

      function showView(name) {
        if (name !== "search") {
          cancelMeaningRequests();
        }
        if (name !== "entry") {
          applyEntryKeyboardLift(0, 0);
        }

        const views = {
          shelf: els.shelfView,
          list: els.listView,
          entry: els.entryView,
          settings: els.settingsView,
          search: els.searchView
        };

        Object.entries(views).forEach(([key, node]) => {
          node.classList.toggle("active", key === name);
        });
      }

      function renderShelf() {
        els.shelfGrid.innerHTML = "";

        state.notebooks.forEach((notebook) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "book-item";
          item.setAttribute("aria-label", formatNotebookTitle(notebook));

          item.innerHTML = `
            <div class="book-figure">
              ${bookSvg()}
              <div class="book-order">${escapeHtml(String(notebook.order))}</div>
            </div>
            <div class="book-caption">${escapeHtml(notebook.name)}</div>
          `;

          let longPressTriggered = false;
          let timer = null;
          let startX = 0;
          let startY = 0;

          const clearPress = () => {
            if (timer) {
              clearTimeout(timer);
              timer = null;
            }
          };

          item.addEventListener("pointerdown", (event) => {
            if (event.button && event.button !== 0) {
              return;
            }
            longPressTriggered = false;
            startX = event.clientX;
            startY = event.clientY;
            clearPress();
            timer = window.setTimeout(() => {
              longPressTriggered = true;
              if (navigator.vibrate) {
                navigator.vibrate(10);
              }
              handleNotebookLongPress(notebook);
            }, 560);
          });

          item.addEventListener("pointermove", (event) => {
            if (!timer) {
              return;
            }
            if (
              Math.abs(event.clientX - startX) > 8 ||
              Math.abs(event.clientY - startY) > 8
            ) {
              clearPress();
            }
          });

          ["pointerup", "pointerleave", "pointercancel"].forEach((eventName) => {
            item.addEventListener(eventName, clearPress);
          });

          item.addEventListener("click", async (event) => {
            if (longPressTriggered) {
              event.preventDefault();
              event.stopPropagation();
              longPressTriggered = false;
              return;
            }
            await openNotebook(notebook.id);
          });

          els.shelfGrid.appendChild(item);
        });

        if (state.notebooks.length < MAX_NOTEBOOKS) {
          const addItem = document.createElement("button");
          addItem.type = "button";
          addItem.className = "book-item";
          addItem.setAttribute("aria-label", "新建笔记本");
          addItem.innerHTML = `
            <div class="book-plus">+</div>
            <div class="book-caption"></div>
          `;
          addItem.addEventListener("click", createNotebook);
          els.shelfGrid.appendChild(addItem);
        }
      }

      // 根据当前笔记本、排序方式、筛选方式渲染列表。
      function renderList() {
        const notebook = getCurrentNotebook();
        if (!notebook) {
          els.wordList.innerHTML = '<div class="empty-block"></div>';
          return;
        }

        els.listNotebookTitle.textContent = formatNotebookTitle(notebook);

        let rows = state.words.filter((word) => word.notebookId === notebook.id);

        if (state.filterMode === "mainOnly") {
          rows = rows.filter((word) => !word.isAnalysis);
        }

        rows = sortWords(rows, state.sortMode);

        els.wordList.innerHTML = "";

        if (!rows.length) {
          els.wordList.innerHTML = '<div class="empty-block"></div>';
          return;
        }

        rows.forEach((record) => {
          const item = document.createElement("div");
          item.className = "word-item";
          item.dataset.id = String(record.id);
          item.innerHTML = `
            <div class="swipe-actions">

      // 全局搜索：在全部笔记本内实时筛选，点击结果后跳转并定位。
      async function renderSearchResults() {
        const rawQuery = els.searchInput.value.trim();
        const query = rawQuery.toLowerCase();
        els.searchResults.innerHTML = "";
        cancelMeaningRequests();

        if (!query) {
          els.searchResults.innerHTML = '<div class="empty-block"></div>';
          return;
        }

        const notebookMap = new Map(state.notebooks.map((notebook) => [notebook.id, notebook]));

        const results = state.words
          .filter((word) => notebookMap.has(word.notebookId))
          .filter((word) => word.word.toLowerCase().includes(query))
          .map((word) => ({
            ...word,
            notebook: notebookMap.get(word.notebookId)
          }))
          .sort((a, b) => {
            const aWord = a.word.toLowerCase();
            const bWord = b.word.toLowerCase();
            const positionDiff = aWord.indexOf(query) - bWord.indexOf(query);
            if (positionDiff !== 0) return positionDiff;
            const wordDiff = aWord.localeCompare(bWord, "en", { sensitivity: "base" });
            if (wordDiff !== 0) return wordDiff;
            const notebookDiff = a.notebook.order - b.notebook.order;
            if (notebookDiff !== 0) return notebookDiff;
            const pageDiff = a.page - b.page;
            if (pageDiff !== 0) return pageDiff;
            return a.createdAt - b.createdAt;
          });

        const meaningTargets = new Map();

        results.forEach((result) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "search-row " + (result.isAnalysis ? "analysis" : "main");

          const book = document.createElement("div");
          book.className = "search-book";
          book.textContent = String(result.notebook.order);

          const page = document.createElement("div");
          page.className = "search-page";
          page.textContent = String(result.page);

          const body = document.createElement("div");
          body.className = "search-body";

          const word = document.createElement("div");
          word.className = "search-word" + (result.isAnalysis ? " analysis" : "");
          word.textContent = result.word;

          const meaning = document.createElement("div");
          meaning.className = "search-meaning";

          body.appendChild(word);
          body.appendChild(meaning);
          row.appendChild(book);
          row.appendChild(page);
          row.appendChild(body);

          const wordKey = normalizeMeaningKey(result.word);
          if (!meaningTargets.has(wordKey)) {
            meaningTargets.set(wordKey, []);
          }
          meaningTargets.get(wordKey).push(meaning);

          row.addEventListener("click", async () => {
            els.searchInput.blur();
            suspendListInteractions(520);
            state.ignoreSwipeUntil = performance.now() + 760;
            await openNotebook(result.notebookId, {
              sortMode: "page",
              filterMode: "all",
              highlightWordId: result.id,
              fromSearch: true
            });
          });
          els.searchResults.appendChild(row);
        });

        if (!results.length) {
          els.searchResults.innerHTML = '<div class="empty-block"></div>';
          return;
        }

        scheduleSearchMeanings(rawQuery, meaningTargets, ++state.searchMeaningToken);
      }

      function bindViewportWatch() {
        const viewport = window.visualViewport;

        const scheduleUpdate = (delay = 0) => {
          if (state.entryViewportTimer) {
            clearTimeout(state.entryViewportTimer);
            state.entryViewportTimer = null;
          }
          state.entryViewportTimer = window.setTimeout(() => {
            updateEntryViewport();
          }, delay);
        };

        const onViewportChange = () => {
          if (state.currentView !== "entry") {
            applyEntryKeyboardLift(0, 0);
            return;
          }
          scheduleUpdate(0);
        };

        if (viewport) {
          viewport.addEventListener("resize", onViewportChange);
          viewport.addEventListener("scroll", onViewportChange);
        }

        window.addEventListener("resize", onViewportChange);
        window.addEventListener("orientationchange", () => {
          window.setTimeout(() => {
            state.entryViewportBase = getViewportLayoutHeight();
            updateEntryViewport();
          }, 180);
        });

        [els.entryPageInput, els.entryWordInput].forEach((input) => {
          input.addEventListener("pointerdown", () => {
            if (!isEntryInput(document.activeElement)) {
              state.entryViewportBase = getViewportLayoutHeight();
            }
            state.entryKeyboardSettlingUntil = performance.now() + 240;
            applyEntryKeyboardLift(0, 0);
          }, { passive: true });

          input.addEventListener("focus", () => {
            state.entryViewportBase = Math.max(state.entryViewportBase || 0, getViewportLayoutHeight());
            state.entryKeyboardSettlingUntil = performance.now() + 240;
            applyEntryKeyboardLift(0, 0);
            scheduleUpdate(260);
          });

          input.addEventListener("blur", () => {
            window.setTimeout(() => {
              if (!isEntryInput(document.activeElement)) {
                state.entryViewportBase = getViewportLayoutHeight();
                applyEntryKeyboardLift(0, 0);
              }
            }, 50);
          });
        });

        updateEntryViewport();
      }

      function getViewportLayoutHeight() {
        const viewport = window.visualViewport;
        return viewport ? viewport.height + viewport.offsetTop : window.innerHeight;
      }

      function isEntryInput(element) {
        return element === els.entryPageInput || element === els.entryWordInput;
      }

      function applyEntryKeyboardLift(lift = 0, offset = 0) {
        document.documentElement.style.setProperty("--keyboard-lift", `${lift}px`);
        document.documentElement.style.setProperty("--keyboard-offset", `${offset}px`);
      }

      function updateEntryViewport() {
        if (state.currentView !== "entry") {
          applyEntryKeyboardLift(0, 0);
          return;
        }

        const layoutHeight = getViewportLayoutHeight();
        if (!state.entryViewportBase) {
          state.entryViewportBase = layoutHeight;
        }

        const keyboardClosedLike = layoutHeight >= state.entryViewportBase - 54;
        if (keyboardClosedLike) {
          state.entryViewportBase = Math.max(state.entryViewportBase, layoutHeight);
        }

        const keyboardOffset = Math.max(0, state.entryViewportBase - layoutHeight);
        const active = isEntryInput(document.activeElement);
        const settling = performance.now() < state.entryKeyboardSettlingUntil;

        let lift = 0;
        if (active && keyboardOffset > 120) {
          const target = Math.min(26, Math.max(0, Math.round((keyboardOffset - 120) * 0.12)));
          lift = settling ? Math.max(-10, -Math.min(10, target)) : -target;
        }

        applyEntryKeyboardLift(lift, keyboardOffset);
      }

      function cancelMeaningRequests() {
        if (state.searchMeaningTimer) {
          clearTimeout(state.searchMeaningTimer);
          state.searchMeaningTimer = null;
        }
        if (state.searchMeaningController) {
          state.searchMeaningController.abort();
          state.searchMeaningController = null;
        }
      }

      function normalizeMeaningKey(word) {
        return String(word || "").trim().toLowerCase();
      }

      function scheduleSearchMeanings(query, meaningTargets, token) {
        if (!navigator.onLine) {
          return;
        }

        state.searchMeaningTimer = window.setTimeout(async () => {
          const appState = await getAppState();
          const apiKey = String(appState.apiKey || "").trim();
          if (!apiKey || token !== state.searchMeaningToken || state.currentView !== "search") {
            return;
          }

          const controller = new AbortController();
          state.searchMeaningController = controller;

          const words = Array.from(meaningTargets.keys()).filter(Boolean);
          const limit = 2;
          let cursor = 0;

          const worker = async () => {
            while (cursor < words.length) {
              const index = cursor;
              cursor += 1;
              const wordKey = words[index];
              if (!wordKey || controller.signal.aborted || token !== state.searchMeaningToken) {
                return;
              }
              const meaning = await fetchWordMeaning(wordKey, apiKey, controller.signal);
              if (!meaning || controller.signal.aborted || token !== state.searchMeaningToken) {
                continue;
              }
              const nodes = meaningTargets.get(wordKey) || [];
              nodes.forEach((node) => {
                node.textContent = meaning;
              });
            }
          };

          await Promise.all(Array.from({ length: Math.min(limit, words.length) }, () => worker()));

          if (state.searchMeaningController === controller) {
            state.searchMeaningController = null;
          }
        }, 320);
      }

      async function fetchWordMeaning(word, apiKey, signal) {
        if (!word || !apiKey) {
          return "";
        }

        const prompt = `请用简短的中文解释以下英文单词的常用含义，每个词性一行，格式为'词性.释义'，只列常用词性，每个释义不超过10个字。示例：
n.海葵
v.固着生长
单词：${word}`;

        try {
          const appState = await getAppState();
          const modelName = String(appState.modelName || "Qwen/Qwen3-8B").trim() || "Qwen/Qwen3-8B";

          const response = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: modelName,
              messages: [{ role: "user", content: prompt }],
              temperature: 0.3
            }),
            signal
          });

          if (!response.ok) {
            return "";
          }

          const data = await response.json();
          const content = String(data?.choices?.[0]?.message?.content || "")
            .replace(/\r/g, "")
            .replace(/^[-•\d.\s]+/gm, "")
            .trim();

          return content;
        } catch (error) {
          return "";
        }
      }

      function sortWords(rows, mode) {
        const list = rows.slice();
        if (mode === "page") {
          return list.sort((a, b) => {
            if (a.page !== b.page) return a.page - b.page;
            return a.createdAt - b.createdAt;
          });
        }
        if (mode === "alpha") {
          return list.sort((a, b) => {
            const aFirst = (a.word[0] || "").toLowerCase();
            const bFirst = (b.word[0] || "").toLowerCase();
            const firstDiff = aFirst.localeCompare(bFirst, "en", { sensitivity: "base" });
            if (firstDiff !== 0) return firstDiff;
            const fullDiff = a.word.toLowerCase().localeCompare(b.word.toLowerCase(), "en", {
              sensitivity: "base"
            });
            if (fullDiff !== 0) return fullDiff;
            return a.createdAt - b.createdAt;
          });
        }
        return list.sort((a, b) => b.createdAt - a.createdAt);
      }

      // 左滑交互：增加方向锁、速度判断和边缘阻尼，减少误触并提升打开成功率。
      function setupSwipe(item) {
        const content = item.querySelector(".swipe-content");
        let startX = 0;
        let startY = 0;
        let startOffset = 0;
        let dragging = false;
        let pointerId = null;
        let axis = null;
        let lastX = 0;
        let lastTime = 0;
        let velocityX = 0;
        let moved = false;

        const getOffset = () => Number(item.dataset.offset || "0");

        const setOffset = (value, withTransition) => {
          let next = value;
          if (next > 0) {
            next *= 0.16;
          }
          if (next < -SWIPE_WIDTH) {
            next = -SWIPE_WIDTH + (next + SWIPE_WIDTH) * 0.2;
          }
          if (withTransition) {
            next = Math.max(-SWIPE_WIDTH, Math.min(0, next));
          }
          item.dataset.offset = String(next);
          content.style.transition = withTransition ? "transform 180ms ease" : "none";
          content.style.transform = `translateX(${next}px)`;
        };

        const finish = (target) => {
          item.dataset.offset = String(target);
          content.style.transition = "transform 180ms ease";
          content.style.transform = `translateX(${target}px)`;
        };

        content.addEventListener("pointerdown", (event) => {
          if (performance.now() < state.ignoreSwipeUntil || els.wordList.classList.contains("swipe-suspended")) {
            return;
          }
          if (event.pointerType === "mouse" && event.button !== 0) {
            return;
          }
          if (event.target.closest("button")) {
            return;
          }

          closeAllSwipes(item);
          dragging = true;
          moved = false;
          pointerId = event.pointerId;
          axis = null;
          startX = event.clientX;
          startY = event.clientY;
          startOffset = getOffset();
          lastX = event.clientX;
          lastTime = performance.now();
          velocityX = 0;
          content.style.willChange = "transform";

          if (content.setPointerCapture) {
            content.setPointerCapture(pointerId);
          }
        });

        content.addEventListener("pointermove", (event) => {
          if (!dragging || event.pointerId !== pointerId) {
            return;
          }

          const deltaX = event.clientX - startX;
          const deltaY = event.clientY - startY;

          if (!axis) {
            if (Math.abs(deltaX) < 5 && Math.abs(deltaY) < 5) {
              return;
            }
            axis = Math.abs(deltaX) > Math.abs(deltaY) * 1.18 ? "x" : "y";
          }

          if (axis !== "x") {
            return;
          }

          moved = true;
          event.preventDefault();
          const now = performance.now();
          const dt = Math.max(16, now - lastTime);
          velocityX = (event.clientX - lastX) / dt;
          lastX = event.clientX;
          lastTime = now;
          setOffset(startOffset + deltaX, false);
        });

        const endDrag = (event) => {
          if (!dragging || event.pointerId !== pointerId) {
            return;
          }

          dragging = false;
          content.style.willChange = "";
          if (content.releasePointerCapture) {
            content.releasePointerCapture(pointerId);
          }

          if (axis !== "x") {
            finish(startOffset < -SWIPE_WIDTH / 2 ? -SWIPE_WIDTH : 0);
            pointerId = null;
            axis = null;
            return;
          }

          const offset = getOffset();
          const shouldOpen = offset < -SWIPE_WIDTH * 0.34 || velocityX < -0.26;
          const shouldClose = offset > -SWIPE_WIDTH * 0.16 || velocityX > 0.24;
          finish(shouldOpen && !shouldClose ? -SWIPE_WIDTH : 0);

          pointerId = null;
          axis = null;
        };

        content.addEventListener("pointerup", endDrag);
        content.addEventListener("pointercancel", endDrag);

        content.addEventListener("click", (event) => {
          if (performance.now() < state.ignoreSwipeUntil || els.wordList.classList.contains("swipe-suspended")) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          if (moved) {
            moved = false;
            return;
          }
          const offset = getOffset();
          if (offset < -8) {
            event.preventDefault();
            event.stopPropagation();
            finish(0);
          }
        });

        finish(0);
      }

      function closeAllSwipes(exceptItem = null) {
        els.wordList.querySelectorAll(".word-item").forEach((item) => {
          if (item === exceptItem) return;
          const content = item.querySelector(".swipe-content");
          if (content) {
            item.dataset.offset = "0";
            content.style.transform = "translateX(0)";
            content.style.transition = "transform 180ms ease";
          }
        });
      }

        const nextOrder =
          state.notebooks.reduce((max, notebook) => Math.max(max, notebook.order), 0) + 1;
        const now = Date.now();

        const notebookId = await addRecord("notebooks", {
          order: nextOrder,
          name: formatMonthYear(now),
          createdAt: now
        });

        await refreshCaches();
        await openNotebook(notebookId);
      }

      async function saveEditedWord() {
        if (!state.editingWordId) {
          return;
        }

        const record = state.words.find((item) => item.id === state.editingWordId);
        if (!record) {
          closeEditModal();
          return;
        }

        const nextPage = normalizePageValue(els.editPageInput.value);
        const nextWord = els.editWordInput.value.trim();

        if (!isValidPage(nextPage) || !nextWord) {
          updateEditButtons();

          ...record,

        });

        state.pendingHighlightWordId = record.id;
        await refreshCaches();
        closeEditModal();
        renderList();

      function isValidPage(value) {
        const page = Number(normalizePageValue(value));
        return Number.isInteger(page) && page >= 1 && page <= 200;
      }

      function normalizePageValue(value) {
        return String(value || "").replace(/\D+/g, "").trim();
      }

      function hasWordValue(value) {
        return String(value || "").trim().length > 0;
      }

      function formatNotebookTitle(notebook) {
        return `#${notebook.order} · ${notebook.name}`;
      }

      function formatMonthYear(timestamp) {
        const date = new Date(timestamp);
        const month = date.toLocaleString("en-US", { month: "short" });
        const year = date.getFullYear();
        return `${month} ${year}`;
      }

      function bookSvg() {
        return `
          <svg class="book-svg" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M16 8H59C65.6 8 71 13.4 71 20V104C71 108.4 67.4 112 63 112H16V8Z" stroke="currentColor" stroke-width="2"/>
            <path d="M19 8V112" stroke="currentColor" stroke-width="2"/>
            <path d="M59 8C67.2 8 74 14.8 74 23V102C74 107.5 69.5 112 64 112" stroke="currentColor" stroke-width="2"/>
            <path d="M19 22H67" stroke="currentColor" stroke-width="1.5"/>
            <path d="M19 98H67" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function showDialog({ title = "", text = "", buttons = [] }) {
        els.modalTitle.textContent = title;
        els.modalText.textContent = text;
        els.modalButtons.innerHTML = "";

        return new Promise((resolve) => {
          state.modalResolver = resolve;

          const normalizedButtons = buttons.length
            ? buttons
            : [{ text: "知道了", value: "ok", variant: "dark" }];

          normalizedButtons.forEach((buttonDef) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "modal-button" + (buttonDef.variant ? ` ${buttonDef.variant}` : "");
            button.textContent = buttonDef.text;
            button.addEventListener("click", () => closeDialog(buttonDef.value));
            els.modalButtons.appendChild(button);
          });

          els.modalOverlay.classList.add("show");
          els.modalOverlay.setAttribute("aria-hidden", "false");
        });
      }

      function closeDialog(value = "cancel") {
        els.modalOverlay.classList.remove("show");
        els.modalOverlay.setAttribute("aria-hidden", "true");
        const resolver = state.modalResolver;
        state.modalResolver = null;
        if (resolver) {
          resolver(value);
        }
      }

      // IndexedDB 结构：notebooks / words / appState 三张表。
      function openDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);

          request.onupgradeneeded = (event) => {
            const db = event.target.result;

            if (!db.objectStoreNames.contains("notebooks")) {
              const notebooks = db.createObjectStore("notebooks", {
                keyPath: "id",
                autoIncrement: true
              });
              notebooks.createIndex("order", "order", { unique: false });
              notebooks.createIndex("createdAt", "createdAt", { unique: false });
            }

            if (!db.objectStoreNames.contains("words")) {
              const words = db.createObjectStore("words", {
                keyPath: "id",
                autoIncrement: true
              });
              words.createIndex("notebookId", "notebookId", { unique: false });
              words.createIndex("createdAt", "createdAt", { unique: false });
            }

            if (!db.objectStoreNames.contains("appState")) {
              db.createObjectStore("appState", {
                keyPath: "id"
              });
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function getStore(storeName, mode = "readonly") {
        return state.db.transaction(storeName, mode).objectStore(storeName);
      }

      function requestToPromise(request) {
        return new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function getAllRecords(storeName) {
        return requestToPromise(getStore(storeName).getAll());
      }

      function getRecord(storeName, key) {
        return requestToPromise(getStore(storeName).get(key));
      }

      function addRecord(storeName, value) {
        return requestToPromise(getStore(storeName, "readwrite").add(value));
      }

      function putRecord(storeName, value) {
        return requestToPromise(getStore(storeName, "readwrite").put(value));
      }

      function deleteRecord(storeName, key) {
        return requestToPromise(getStore(storeName, "readwrite").delete(key));
      }

      async function ensureAppState() {
        const current = await getRecord("appState", APP_STATE_ID);
        if (!current) {
          await putRecord("appState", {
            id: APP_STATE_ID,
            lastNotebookId: null,
            lastSortMode: "page",
            lastFilterMode: "mainOnly",
            apiKey: "",
            modelName: "Qwen/Qwen3-8B"
          });
        }
      }

      async function getAppState() {
        return (
          (await getRecord("appState", APP_STATE_ID)) || {
            id: APP_STATE_ID,
            lastNotebookId: null,
            lastSortMode: "page",
            lastFilterMode: "mainOnly",
            apiKey: "",
            modelName: "Qwen/Qwen3-8B"
          }
        );
      }

      async function saveAppState(patch) {
        const current = await getAppState();
        await putRecord("appState", {
          ...current,
          ...patch,
          id: APP_STATE_ID
        });
      }

      // 删除笔记本时，顺带删除其下单词，并把后续序号整体前移，保持连续。
      async function deleteNotebookCascade(notebookId) {
        const notebook = state.notebooks.find((item) => item.id === notebookId);
        if (!notebook) {
          return;
        }

        const wordsToDelete = state.words.filter((word) => word.notebookId === notebookId);
        for (const word of wordsToDelete) {
          await deleteRecord("words", word.id);
        }

        await deleteRecord("notebooks", notebookId);

        const afterNotebooks = state.notebooks
          .filter((item) => item.order > notebook.order)
          .sort((a, b) => a.order - b.order);

        for (const item of afterNotebooks) {
          await putRecord("notebooks", {
            ...item,
            order: item.order - 1
          });
        }
      }
    })();
  </script>
